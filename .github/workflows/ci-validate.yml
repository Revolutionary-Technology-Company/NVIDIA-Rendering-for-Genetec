# .github/workflows/ci-validate.yml
name: 🛡️ Pipeline Code Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-code-integrity:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    - name: 🐍 Initialize Python Runtime
      uses: actions/setup-python@v5
      with:
        python-numeric-version: '3.10'
        cache: 'pip' # Automatically caches packages to speed up subsequent PR runs

    - name: ⚙️ Install Core Code Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Install only the hardware-independent packages required for structural testing
        pip install numba paho-mqtt pandas plotly numpy pytest

    - name: 🔬 Execute Automated Mock Validation
      run: |
        # Run our dedicated import test suite
        python tests/test_imports.py

    - name: 🪞 Code Formatting Lint Check
      run: |
        pip install flake8
        # Stop the build if there are critical Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit gracefully on style warnings (leaves room for team development flexibility)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
