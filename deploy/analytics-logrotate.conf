# deploy/analytics-logrotate.conf
/var/lib/docker/containers/*/*.log 
/var/log/mosquitto/*.log
/var/log/streamlit/*.log
{
    # Split the logs every single day
    daily
    
    # Keep exactly 7 days of historical logs locally before purging
    rotate 7
    
    # Force a log split immediately if a file grows past 100 Megabytes
    size 100M
    
    # Compress old logs using gzip to minimize local drive footprint
    compress
    delaycompress
    
    # Prevent system errors if a log file is temporarily empty or missing
    missingok
    notifempty
    
    # Truncate the original log file in-place so active containers 
    # don't lose their file handlers or crash
    copytruncate
}
